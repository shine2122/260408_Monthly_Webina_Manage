<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:'Apple SD Gothic Neo',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

      <!-- 헤더 -->
      <tr>
        <td style="background:#534AB7;padding:28px 36px;">
          <div style="color:#fff;font-size:13px;opacity:0.8;margin-bottom:4px;">크리AI티브 랩</div>
          <div style="color:#fff;font-size:22px;font-weight:700;">오늘 웨비나 어떠셨나요? 💬</div>
        </td>
      </tr>

      <!-- 본문 -->
      <tr>
        <td style="padding:32px 36px;">
          <p style="font-size:16px;margin:0 0 20px;line-height:1.6;">
            오늘 웨비나에 참석해 주셔서 진심으로 감사드립니다!<br>
            강의에 대한 솔직한 피드백은 저희에게 큰 도움이 됩니다.
          </p>

          <!-- 피드백 버튼 -->
          <table cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
            <tr>
              <td align="center" style="background:#534AB7;border-radius:8px;">
                <a href="{feedback_link}" target="_blank"
                   style="display:inline-block;padding:14px 40px;color:#fff;text-decoration:none;font-size:15px;font-weight:700;">
                  📝 피드백 남기기
                </a>
              </td>
            </tr>
          </table>

          <p style="font-size:14px;color:#444;line-height:1.8;margin:0 0 20px;">
            3분이면 충분합니다. 여러분의 피드백으로 다음 웨비나는 더 좋아집니다! 😊
          </p>

          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0eeff;border-radius:8px;">
            <tr>
              <td style="padding:16px 20px;">
                <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:6px;">다음 웨비나 안내</div>
                <div style="font-size:13px;color:#555;line-height:1.7;">
                  다음 웨비나 소식도 이메일과 문자로 가장 먼저 안내드리겠습니다.<br>
                  계속 함께해 주세요.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- 푸터 -->
      <tr>
        <td style="background:#f9f9fb;padding:20px 36px;border-top:1px solid #eee;">
          <div style="font-size:12px;color:#aaa;text-align:center;">
            크리AI티브 랩 · 본 메일은 발신 전용입니다
          </div>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
