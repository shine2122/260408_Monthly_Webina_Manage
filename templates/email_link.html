<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:'Apple SD Gothic Neo',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

      <!-- 헤더 -->
      <tr>
        <td style="background:#534AB7;padding:28px 36px;">
          <div style="color:#fff;font-size:13px;opacity:0.8;margin-bottom:4px;">크리AI티브 랩</div>
          <div style="color:#fff;font-size:22px;font-weight:700;">내일 웨비나 Google Meet 링크 안내</div>
        </td>
      </tr>

      <!-- 본문 -->
      <tr>
        <td style="padding:32px 36px;">
          <p style="font-size:16px;margin:0 0 20px;line-height:1.6;">
            안녕하세요!<br>
            내일 웨비나가 하루 앞으로 다가왔습니다. 아래 링크로 입장해 주세요.
          </p>

          <!-- 일시 박스 -->
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0eeff;border-radius:8px;margin-bottom:28px;">
            <tr>
              <td style="padding:20px 24px;">
                <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:8px;">웨비나 일정</div>
                <div style="font-size:15px;font-weight:600;color:#222;margin-bottom:4px;">{webinar_title}</div>
                <div style="font-size:14px;color:#555;">{webinar_date} 20:00 ~ 22:00</div>
              </td>
            </tr>
          </table>

          <!-- Google Meet 버튼 -->
          <table cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
            <tr>
              <td align="center" style="background:#534AB7;border-radius:8px;">
                <a href="{meet_link}" target="_blank"
                   style="display:inline-block;padding:14px 40px;color:#fff;text-decoration:none;font-size:15px;font-weight:700;">
                  🎥 Google Meet 입장하기
                </a>
              </td>
            </tr>
          </table>

          <!-- 강사 소개 -->
          <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e8e8ec;border-radius:8px;margin-bottom:24px;">
            <tr>
              <td style="padding:18px 22px;">
                <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:10px;">강사 소개</div>
                <div style="font-size:14px;color:#444;line-height:1.8;">
                  👩‍🏫 <strong>{speaker1}</strong> · <strong>{speaker2}</strong><br>
                  {topic1} · {topic2}
                </div>
              </td>
            </tr>
          </table>

          <p style="font-size:14px;color:#e65100;font-weight:600;margin:0 0 8px;">
            ⏰ 시작 5분 전 입장 부탁드립니다!
          </p>
          <p style="font-size:13px;color:#888;margin:0;">
            링크 클릭 시 Google Meet 앱 또는 브라우저로 바로 연결됩니다.
          </p>
        </td>
      </tr>

      <!-- 푸터 -->
      <tr>
        <td style="background:#f9f9fb;padding:20px 36px;border-top:1px solid #eee;">
          <div style="font-size:12px;color:#aaa;text-align:center;">
            크리AI티브 랩 · 본 메일은 발신 전용입니다
          </div>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
