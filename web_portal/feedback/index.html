<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>크리AI티브 웨비나 피드백</title>
  <style>
    :root {
      --bg: #eef3ff;
      --card: rgba(255, 255, 255, 0.94);
      --ink: #182230;
      --muted: #667085;
      --accent: #0f4c81;
      --accent-soft: #dcecff;
      --line: #d7e3f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(15, 76, 129, 0.18), transparent 22%),
        linear-gradient(180deg, #f5f9ff 0%, var(--bg) 100%);
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 34px 18px 72px;
    }
    .intro, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(40, 63, 96, 0.1);
    }
    .intro {
      padding: 30px;
      margin-bottom: 18px;
    }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }
    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      max-width: 680px;
    }
    .panel {
      padding: 24px 22px;
    }
    form {
      display: grid;
      gap: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      font: inherit;
      color: var(--ink);
      outline: none;
    }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.08);
    }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 15px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.65; cursor: wait; }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }
    .status.error { color: #b42318; }
    .status.success { color: #027a48; }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .intro, .panel { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="intro">
      <div class="pill" id="month-pill">웨비나 피드백</div>
      <h1 id="feedback-title">오늘 웨비나는 어땠나요?</h1>
      <p>
        좋은 점은 유지하고, 아쉬운 점은 바로 개선하려고 합니다.
        3분 안에 끝나는 짧은 폼입니다. 다음 웨비나의 완성도를 높이는 데 그대로 반영하겠습니다.
      </p>
    </section>

    <section class="panel">
      <form id="feedback-form">
        <label>성함
          <input type="text" name="name" required>
        </label>
        <label>전체 만족도
          <select name="rating" required>
            <option value="">선택해 주세요</option>
            <option value="5">5점 매우 만족</option>
            <option value="4">4점 만족</option>
            <option value="3">3점 보통</option>
            <option value="2">2점 아쉬움</option>
            <option value="1">1점 매우 아쉬움</option>
          </select>
        </label>
        <label>가장 좋았던 점
          <textarea name="bestPart" placeholder="강의 구성, 사례, 진행 방식 등"></textarea>
        </label>
        <label>다음에 듣고 싶은 주제
          <textarea name="nextTopic" placeholder="다음 달 웨비나에서 다뤘으면 하는 주제를 적어 주세요"></textarea>
        </label>
        <label>자유 의견
          <textarea name="comment" placeholder="운영, 시간, 자료, 난이도 관련 의견이 있으면 남겨 주세요"></textarea>
        </label>
        <button type="submit" id="submit-btn">피드백 보내기</button>
        <div class="status" id="status"></div>
      </form>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const month = params.get("month") || "2026-04";
    const title = params.get("title") || "크리AI티브 웨비나";

    document.getElementById("month-pill").textContent = "웨비나 피드백";
    document.getElementById("feedback-title").textContent = `${title}는 어떠셨나요?`;

    const form = document.getElementById("feedback-form");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.className = "status";
      status.textContent = "피드백을 저장하고 있습니다.";
      submitBtn.disabled = true;

      const formData = new FormData(form);
      const payload = {
        month,
        title,
        name: formData.get("name"),
        rating: formData.get("rating"),
        bestPart: formData.get("bestPart"),
        nextTopic: formData.get("nextTopic"),
        comment: formData.get("comment"),
      };

      try {
        const response = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.message || "피드백 저장 중 오류가 발생했습니다.");
        }
        form.reset();
        status.className = "status success";
        status.textContent = "피드백 감사합니다. 다음 웨비나 개선에 바로 반영하겠습니다.";
      } catch (error) {
        status.className = "status error";
        status.textContent = error.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
